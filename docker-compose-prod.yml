version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_backend_prod
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DB_HOST=mysql
      - REDIS_ADDR=redis:6379
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8
    container_name: rag_mysql_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: rag_db
      MYSQL_USER: rag_user
      MYSQL_PASSWORD: rag_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: rag_redis_prod
    restart: always
    ports:
      - "6379:6379"

volumes:
  mysql_data:
